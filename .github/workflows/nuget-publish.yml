name: Publish NuGet Package

on:
  release:
    types:
      - published

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      CONFIGURATION: Release
      OUTPUT_DIR: ${{ github.workspace }}/out
      PROJECTS: |
        src/LiveMarkdown.Avalonia/LiveMarkdown.Avalonia.csproj
        src/LiveMarkdown.Avalonia.Math/LiveMarkdown.Avalonia.Math.csproj
        src/LiveMarkdown.Avalonia.Mermaid/LiveMarkdown.Avalonia.Mermaid.csproj
        src/LiveMarkdown.Avalonia.Svg/LiveMarkdown.Avalonia.Svg.csproj
        src/LiveMarkdown.Avalonia.Svg.Skia/LiveMarkdown.Avalonia.Svg.Skia.csproj
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          submodules: true
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Prepare release metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release tag is required."
          }

          $numericVersion = ($version -split '[-+]')[0]
          $versionParts = @($numericVersion -split '\.')
          if ($versionParts.Count -lt 3 -or $versionParts.Count -gt 4 -or ($versionParts | Where-Object { $_ -notmatch '^\d+$' })) {
            throw "Release tag '$($env:RELEASE_TAG)' must resolve to a numeric version such as v1.2.3."
          }

          while ($versionParts.Count -lt 4) {
            $versionParts += '0'
          }

          $assemblyVersion = $versionParts -join '.'
          $releaseNotes = $env:RELEASE_BODY
          if ([string]::IsNullOrWhiteSpace($releaseNotes)) {
            $releaseNotes = "See release $($env:RELEASE_TAG)."
          }

          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSEMBLY_VERSION=$assemblyVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $delimiter = [guid]::NewGuid().ToString()
          "PACKAGE_RELEASE_NOTES<<$delimiter" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $releaseNotes | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $delimiter | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore dependencies
        shell: pwsh
        run: |
          $projects = $env:PROJECTS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          foreach ($project in $projects) {
            dotnet restore $project
          }

      - name: Build
        shell: pwsh
        run: |
          $projects = $env:PROJECTS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          $versionProperties = @(
            "-p:Version=$env:PACKAGE_VERSION"
            "-p:PackageVersion=$env:PACKAGE_VERSION"
            "-p:AssemblyVersion=$env:ASSEMBLY_VERSION"
            "-p:FileVersion=$env:ASSEMBLY_VERSION"
            "-p:InformationalVersion=$env:PACKAGE_VERSION"
            "-p:IncludeSourceRevisionInInformationalVersion=false"
          )

          foreach ($project in $projects) {
            dotnet build $project --configuration $env:CONFIGURATION --no-restore @versionProperties
          }

      - name: Pack
        shell: pwsh
        run: |
          $year = (Get-Date).Year
          if ($year -eq 2025) {
            $copyright = "Copyright 2025 DearVa"
          } else {
            $copyright = "Copyright 2025-$year DearVa"
          }

          $projects = $env:PROJECTS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          $versionProperties = @(
            "-p:Version=$env:PACKAGE_VERSION"
            "-p:PackageVersion=$env:PACKAGE_VERSION"
            "-p:AssemblyVersion=$env:ASSEMBLY_VERSION"
            "-p:FileVersion=$env:ASSEMBLY_VERSION"
            "-p:InformationalVersion=$env:PACKAGE_VERSION"
            "-p:IncludeSourceRevisionInInformationalVersion=false"
          )

          $releaseNotesProps = Join-Path $env:RUNNER_TEMP "LiveMarkdown.PackageReleaseNotes.props"
          $escapedReleaseNotes = [System.Security.SecurityElement]::Escape($env:PACKAGE_RELEASE_NOTES)
          $releaseNotesXml = @(
            "<Project>"
            "  <PropertyGroup>"
            "    <PackageReleaseNotes>$escapedReleaseNotes</PackageReleaseNotes>"
            "  </PropertyGroup>"
            "</Project>"
          ) -join [Environment]::NewLine
          [System.IO.File]::WriteAllText($releaseNotesProps, $releaseNotesXml, [System.Text.UTF8Encoding]::new($false))

          $packProperties = $versionProperties + @(
            "-p:Copyright=$copyright"
            "-p:CustomBeforeMicrosoftCommonTargets=$releaseNotesProps"
            "-p:IncludeSymbols=true"
            "-p:SymbolPackageFormat=snupkg"
          )

          foreach ($project in $projects) {
            dotnet pack $project --configuration $env:CONFIGURATION --no-build @packProperties -o $env:OUTPUT_DIR
          }

      - name: Publish to NuGet
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem -Path $env:OUTPUT_DIR -Filter "*.*nupkg")
          if ($packages.Count -eq 0) { throw 'No nupkg files found!' }
          foreach ($pkg in $packages) {
            dotnet nuget push $pkg.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
